name: Deploy to Elastx

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build and deploy
        run: |
          cd ~/verit-se
          git pull origin master
          docker compose build --no-cache
          docker compose up -d
          docker image prune -f
